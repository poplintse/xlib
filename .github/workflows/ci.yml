name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate contract and release manifest
        run: |
          ruby scripts/check-contract.rb
          ./scripts/release-check.sh 0.9.0

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: services/backend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew :app:testDebugUnitTest lintDebug :app:assembleDebug
      - name: Verify build did not change version
        run: git diff --exit-code -- version.properties

  apple:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Test shared Swift package
        run: swift test --package-path packages/apple-shared
      - name: Build iOS
        run: ./scripts/build-ios-debug.sh
      - name: Test iOS
        shell: bash
        run: |
          device_name="$(xcrun simctl list devices available -j | ruby -rjson -e 'data=JSON.parse(STDIN.read); puts data.fetch("devices").values.flatten.find { |d| d["name"].start_with?("iPhone") }.fetch("name")')"
          xcodebuild \
            -project apps/ios/XLibReader.xcodeproj \
            -scheme XLibReader \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=${device_name},OS=latest" \
            -derivedDataPath "${RUNNER_TEMP}/xlib-ios-tests" \
            CODE_SIGNING_ALLOWED=NO \
            test
      - name: Verify builds did not change versions
        run: git diff --exit-code -- apps/ios/XLibReader.xcodeproj/project.pbxproj apps/ios/XLibReader/Resources/Info.plist
